name: Actualizar Partidos MLB + FIFA

on:
  schedule:
    - cron: '0 9 * * *'      # Todos los días a las 9:00 AM (hora UTC)
  workflow_dispatch:         # Permite ejecutar manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Actualizar matches.json
        run: python mlb_automatic.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add matches.json
          git commit -m "Actualización automática de partidos - $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
